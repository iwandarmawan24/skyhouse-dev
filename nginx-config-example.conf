# Nginx vhost for bare-metal (nginx + php-fpm) deploys.
#
# To deploy to a new domain, this is the ONLY line you need to change:
#   server_name YOUR_DOMAIN www.YOUR_DOMAIN;
#
# Everything else (APP_URL, asset URLs, etc.) is derived from the domain
# automatically via Laravel's APP_URL env var — just make sure .env's
# APP_URL matches this same domain (see .env.production.example).

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;
    root /var/www/skyhouse-dev/public;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    index index.php;

    charset utf-8;

    # Max upload size (increase if admins upload large media)
    client_max_body_size 100M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        # Adjust to whatever PHP-FPM version is installed on the server
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;

        # Increase timeouts for large uploads
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
}

# After deploying, get HTTPS with:
#   sudo certbot --nginx -d YOUR_DOMAIN -d www.YOUR_DOMAIN
# Certbot will rewrite this file to add the SSL server block and redirect
# automatically — no manual SSL config needed here.
